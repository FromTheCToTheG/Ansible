---
- name: Update System und führe Reboot bei Bedarf durch
  hosts: all
  become: yes

  vars:
    gotify_url: "https://gotify.calila.duckdns.org/message"
    gotify_token: "{{ lookup('env', 'GOTIFY') }}"

  tasks:

    ###########################################################################
    # 1. Release-Info-Änderungen akzeptieren (Debian Major Upgrade Fix)
    ###########################################################################
    - name: Release-Info-Änderungen akzeptieren (Debian)
      command: apt-get update --allow-releaseinfo-change
      register: releaseinfo
      changed_when: "'Reading package lists' in releaseinfo.stdout"
      failed_when: false
      when:
        - ansible_facts["pkg_mgr"] == "apt"
        - ansible_facts["os_family"] == "Debian"

    ###########################################################################
    # 2. Container- und Nicht-APT-Systeme überspringen
    ###########################################################################
    - name: Überspringe Hosts ohne APT oder echte Container
      debug:
        msg: "Host wird übersprungen (kein apt oder echter Container)"
      when:
        - ansible_facts["pkg_mgr"] != "apt"
          or (
              ansible_facts["virtualization_type"] in ["lxc", "docker"]
              and ansible_facts["virtualization_role"] == "guest"
            )

    ###########################################################################
    # 3. Hauptblock: apt-Update, Upgrade, Autoremove, Reboot
    ###########################################################################
    - name: System aktualisieren inklusive optionalem Reboot
      block:

        - name: APT Cache aktualisieren
          apt:
            update_cache: yes
            force_apt_get: yes
            cache_valid_time: 3600

        - name: System aktualisieren
          apt:
            upgrade: dist

        - name: Alte Pakete entfernen und Cache säubern
          apt:
            autoremove: yes
            autoclean: yes
            clean: yes

        - name: Prüfen, ob ein Reboot erforderlich ist
          stat:
            path: /var/run/reboot-required
          register: reboot_required_file

        - name: Reboot durchführen, falls erforderlich
          reboot:
            msg: "Reboot durch Ansible wegen Kernel-/Systemupdate"
            connect_timeout: 5
            reboot_timeout: 300
            pre_reboot_delay: 0
            post_reboot_delay: 30
            test_command: uptime
          when: reboot_required_file.stat.exists

        - name: Warten bis Host wieder erreichbar ist
          wait_for_connection:
            connect_timeout: 5
            sleep: 5
            delay: 10
            timeout: 300
          when: reboot_required_file.stat.exists

      when:
        - ansible_facts["pkg_mgr"] == "apt"
        - not (
            ansible_facts["virtualization_type"] in ["lxc", "docker"]
            and ansible_facts["virtualization_role"] == "guest"
          )

      rescue:

        - name: Benachrichtige Gotify bei Fehler
          uri:
            url: "{{ gotify_url }}"
            method: POST
            headers:
              X-Gotify-Key: "{{ gotify_token }}"
            body_format: form-urlencoded
            body:
              title: "Fehler im Deployment"
              message: "Das Playbook ist auf {{ inventory_hostname }} fehlgeschlagen."
              priority: 5
          ignore_errors: yes
